<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Test</title>
  <style>
    :root {
      color-scheme: light dark;
      --primary: #4f46e5;
      --secondary: #a855f7;
      --text: #1f2937;
      --text-light: #f9fafb;
      --background: linear-gradient(135deg, rgba(79, 70, 229, 0.85), rgba(168, 85, 247, 0.85));
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Poppins", "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--background), url('https://images.unsplash.com/photo-1471879832106-c7ab9e0cee23?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat fixed;
      color: var(--text-light);
    }

    .card {
      position: relative;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      padding: 3rem 4rem;
      text-align: center;
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.25);
    }

    .card h1 {
      font-size: 3.5rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .card p {
      font-size: 1.1rem;
      max-width: 28rem;
      line-height: 1.6;
      margin: 0 auto;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.2rem;
      margin-bottom: 1.5rem;
      border-radius: 999px;
      background: rgba(79, 70, 229, 0.85);
      font-weight: 600;
      letter-spacing: 0.08em;
    }

    .glow {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(circle at top, rgba(79, 70, 229, 0.5), transparent),
        radial-gradient(circle at bottom, rgba(168, 85, 247, 0.55), transparent);
      filter: blur(30px);
      z-index: -1;
    }

    @media (max-width: 600px) {
      .card {
        padding: 2.5rem 2rem;
      }

      .card h1 {
        font-size: 2.8rem;
      }

      .card p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="glow"></div>
    <div class="badge">Elegantný moment</div>
    <h1>a test</h1>
    <p>
      Toto je jednoduchá ukážka stránky s textom „a test“. Pozadie vytvára príjemnú atmosféru
      a jemný sklenený efekt zvýrazňuje dôležitý obsah uprostred obrazovky.
    </p>
  </div>
</body>
</html>
